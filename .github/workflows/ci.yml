name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same branch / PR — saves Actions minutes
# on force-push iterations.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# All `tofu` jobs pin the same version so a Tofu point-release can't
# silently change CI behaviour. Bump intentionally.
env:
  TOFU_VERSION: 1.12.0

jobs:
  # ─── Static checks (fast, run on every push / PR) ────────────────

  fmt:
    name: tofu fmt -check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: ${{ env.TOFU_VERSION }}
      - run: tofu fmt -check -recursive

  tflint:
    name: tflint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: latest
      # `--init` resolves any plugins declared in .tflint.hcl. Cheap on
      # the first run, instant on subsequent ones via the action's cache.
      - run: tflint --init
      # --recursive walks examples/ too.
      - run: tflint --recursive

  # ─── Validate (per-directory, fast) ──────────────────────────────

  validate:
    name: tofu validate (${{ matrix.dir }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Each directory that contains a tofu root config gets its own
        # init + validate. Add new examples here when they land.
        dir:
          - "."
          - "examples/basic"
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@v6
      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: ${{ env.TOFU_VERSION }}
      # -backend=false because no backend is configured at module level
      # (it lives in consumers). Skipping backend init also means we
      # don't need any cloud credentials in CI.
      - run: tofu init -backend=false
      - run: tofu validate

  # ─── Native test framework (will become the real test suite) ─────

  tofu-test:
    name: tofu test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: ${{ env.TOFU_VERSION }}
      - name: Skip if no .tftest.hcl files
        id: detect
        run: |
          if compgen -G "tests/*.tftest.hcl" > /dev/null || compgen -G "*.tftest.hcl" > /dev/null; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            echo "No .tftest.hcl files found — skipping. Add tests under tests/ to enable."
          fi
      - if: steps.detect.outputs.has_tests == 'true'
        run: tofu init -backend=false
      - if: steps.detect.outputs.has_tests == 'true'
        # `tofu test` walks tests/*.tftest.hcl and the root for stray files.
        # Each test file declares its own command (plan or apply) — plan-only
        # tests run fine here; apply tests need real provider credentials
        # and should be marked with `command = apply` + a runs-on tag we
        # don't have yet (or a manual workflow_dispatch).
        run: tofu test

  # ─── IaC security scan (advisory, doesn't block on noise) ─────────

  trivy-iac:
    name: Trivy IaC scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # codeql-action needs both to upload + access the workflow run.
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v6
      - name: Run Trivy in IaC config mode
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          # MEDIUM+ keeps the signal-to-noise reasonable on a module
          # this small. Bump to LOW only when triaging.
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: "0"
          format: sarif
          output: trivy-iac.sarif
      - name: Upload SARIF to GitHub Security
        if: always() && github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-iac.sarif

  # ─── PR hygiene ───────────────────────────────────────────────────

  pr-title:
    name: PR title is conventional
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Standard Conventional Commits types. Picking a small set
          # rather than the full list keeps PR titles consistent.
          types: |
            feat
            fix
            chore
            ci
            docs
            test
            refactor
            perf
          requireScope: false
